<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GRAND</title>
<style>
  :root{--green-hi:#12291c;--green:#0e2016;--green-lo:#0a140d;--ink:#121212;--gold:#c2a14d;--gold-hi:#e6cf94;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ink)}
  .hero{position:fixed;inset:0;display:grid;place-items:center;
    background:radial-gradient(120% 90% at 50% 38%,var(--green-hi) 0%,var(--green) 34%,var(--green-lo) 72%,var(--ink) 100%);
    isolation:isolate;cursor:default}
  .hero::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(38% 32% at 50% 42%,rgba(122,158,120,.16),rgba(0,0,0,0) 70%);animation:breathe 7s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
  .hero::after{content:"";position:absolute;inset:0;z-index:3;pointer-events:none;
    background:radial-gradient(130% 120% at 50% 45%,rgba(0,0,0,0) 52%,rgba(0,0,0,.55) 100%);mix-blend-mode:multiply}
  .stage{position:relative;z-index:2;width:min(46vw,340px);aspect-ratio:32.25/45;filter:drop-shadow(0 18px 40px rgba(0,0,0,.55))}
  @media (max-width:760px){.stage{width:min(64vw,300px)}}
  svg.mark{display:block;width:100%;height:100%;overflow:visible}
  .tagline{position:absolute;z-index:2;left:0;right:0;bottom:12vh;text-align:center;color:#e9efe8;
    font-family:"Hiragino Mincho ProN","YuMincho","Yu Mincho",serif;letter-spacing:.42em;font-weight:400;
    font-size:clamp(13px,1.5vw,18px);opacity:0;transform:translateY(8px);text-indent:.42em;
    transition:opacity 1.2s ease,transform 1.2s cubic-bezier(.2,.7,.2,1)}
  .tagline.show{opacity:1;transform:translateY(0)}
  .tagline .en{display:block;margin-top:.9em;font-family:"Optima","Didot",Georgia,serif;letter-spacing:.62em;
    font-size:clamp(11px,1.2vw,14px);color:var(--gold-hi);opacity:.9;text-indent:.62em}
  .grain{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:.05;mix-blend-mode:overlay}
  @media (prefers-reduced-motion:reduce){.hero::before{animation:none}}
</style>
</head>

<script>
(function(){
  var s1=document.getElementById('s1'), s2=document.getElementById('s2'),
      gold=document.getElementById('gold'), tag=document.getElementById('tag'), hero=document.getElementById('hero');
  var DRAW=2600;
  var GOLD_AT=DRAW-250, GOLD_DUR=900;
  var FEATHER=0.05;
  function clamp01(v){return v<0?0:v>1?1:v;}
  function bez(p){var x1=.42,y1=0,x2=.2,y2=1;
    function cx(t){return 3*(1-t)*(1-t)*t*x1+3*(1-t)*t*t*x2+t*t*t;}
    function cy(t){return 3*(1-t)*(1-t)*t*y1+3*(1-t)*t*t*y2+t*t*t;}
    var t=p;for(var i=0;i<6;i++){var e=cx(t)-p,d=(cx(t+1e-3)-cx(t-1e-3))/2e-3;if(Math.abs(e)<1e-4)break;t-=e/(d||1);}
    return cy(clamp01(t));}
  function applyState(t){
    var p=clamp01(t/DRAW), e=bez(p);
    var edge=e*(1+FEATHER);
    s1.setAttribute('offset', clamp01(edge-FEATHER));
    s2.setAttribute('offset', clamp01(edge));
    if(t>=GOLD_AT && t<=GOLD_AT+GOLD_DUR){var gp=clamp01((t-GOLD_AT)/GOLD_DUR);gold.setAttribute('x',-40+130*gp);gold.setAttribute('opacity',Math.sin(Math.PI*gp)*0.8);} else gold.setAttribute('opacity',0);
    if(t>=DRAW-150) tag.classList.add('show'); else tag.classList.remove('show');
  }
  function setFinal(){ s1.setAttribute('offset',1); s2.setAttribute('offset',1); gold.setAttribute('opacity',0); tag.classList.add('show'); }
  function reset(){ s1.setAttribute('offset',0); s2.setAttribute('offset',0); gold.setAttribute('opacity',0); tag.classList.remove('show'); }
  var END=DRAW+GOLD_DUR+150, start=null, raf=null;
  function frame(ts){ if(start===null)start=ts; var t=ts-start; if(t>=END){setFinal();return;} applyState(t); raf=requestAnimationFrame(frame); }
  function play(){ if(raf)cancelAnimationFrame(raf); start=null; reset(); raf=requestAnimationFrame(frame); }
  var seek=new URLSearchParams(location.search).get('seek');
  if(seek!==null){ reset(); applyState(parseFloat(seek)); }
  else if(matchMedia('(prefers-reduced-motion: reduce)').matches){ setFinal(); }
  else { reset(); play(); hero.addEventListener('click', play); }
})();
</script>
