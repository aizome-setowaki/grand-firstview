<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GRAND</title>
<style>
  :root{--green-hi:#12291c;--green:#0e2016;--green-lo:#0a140d;--ink:#121212;--gold:#c2a14d;--gold-hi:#e6cf94;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ink)}
  .hero{position:fixed;inset:0;display:grid;place-items:center;cursor:pointer;
    background:radial-gradient(120% 90% at 50% 40%,var(--green-hi) 0%,var(--green) 34%,var(--green-lo) 72%,var(--ink) 100%);
    isolation:isolate}
  .hero::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(40% 34% at 50% 46%,rgba(122,158,120,.16),rgba(0,0,0,0) 70%);animation:breathe 7s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
  .hero::after{content:"";position:absolute;inset:0;z-index:3;pointer-events:none;
    background:radial-gradient(130% 120% at 50% 46%,rgba(0,0,0,0) 52%,rgba(0,0,0,.55) 100%);mix-blend-mode:multiply}
  .stage{position:relative;z-index:2;width:min(60vw,760px);filter:drop-shadow(0 18px 46px rgba(0,0,0,.5))}
  @media (max-width:760px){.stage{width:min(84vw,460px)}}
  .stage video{display:block;width:100%;height:auto}
  .tagline{position:absolute;z-index:2;left:0;right:0;bottom:13vh;text-align:center;color:#e9efe8;
    font-family:"Hiragino Mincho ProN","YuMincho","Yu Mincho",serif;letter-spacing:.5em;font-weight:400;
    font-size:clamp(12px,1.4vw,16px);opacity:0;transform:translateY(8px);text-indent:.5em;
    animation:tin 1.2s cubic-bezier(.2,.7,.2,1) forwards;animation-delay:1.9s}
  @keyframes tin{to{opacity:.92;transform:translateY(0)}}
  .grain{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:.05;mix-blend-mode:overlay}
  @media (prefers-reduced-motion:reduce){.hero::before{animation:none}.tagline{animation:none;opacity:.92;transform:none}}
</style>
</head>
<body>
<div class="hero" id="hero" title="クリックでリプレイ">
  <div class="stage">
    <video id="logo" src="motion/grand_reveal_v2.webm" autoplay muted playsinline preload="auto"></video>
  </div>
  <svg class="grain" xmlns="http://www.w3.org/2000/svg"><filter id="gr"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#gr)"/></svg>
</div>
<script>
  var v = document.getElementById('logo'), hero = document.getElementById('hero');
  v.addEventListener('ended', function(){ try{ v.pause(); }catch(e){} });
  hero.addEventListener('click', function(){ try{ v.currentTime = 0; v.play(); }catch(e){} });
</script>
</body>
</html>
