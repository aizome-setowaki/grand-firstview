<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GRAND</title>
<style>
  :root{--green-hi:#12291c;--green:#0e2016;--green-lo:#0a140d;--ink:#121212;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ink)}
  .hero{position:fixed;inset:0;display:grid;place-items:center;cursor:pointer;
    background:radial-gradient(120% 90% at 50% 46%,var(--green-hi) 0%,var(--green) 34%,var(--green-lo) 72%,var(--ink) 100%);
    isolation:isolate}
  .hero::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(42% 40% at 50% 50%,rgba(122,158,120,.18),rgba(0,0,0,0) 70%);animation:breathe 7s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
  .hero::after{content:"";position:absolute;inset:0;z-index:3;pointer-events:none;
    background:radial-gradient(130% 120% at 50% 50%,rgba(0,0,0,0) 50%,rgba(0,0,0,.55) 100%);mix-blend-mode:multiply}
  .stage{position:relative;z-index:2;height:min(82vh,880px);filter:drop-shadow(0 26px 60px rgba(0,0,0,.55));
    animation:pop 1.1s cubic-bezier(.2,.9,.25,1) both}
  @keyframes pop{0%{transform:scale(.86)}60%{transform:scale(1.02)}100%{transform:scale(1)}}
  @media (max-width:760px){.stage{height:auto;width:min(88vw,560px)}}
  .stage video{display:block;height:100%;width:auto}
  @media (max-width:760px){.stage video{width:100%;height:auto}}
  .grain{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:.05;mix-blend-mode:overlay}
  @media (prefers-reduced-motion:reduce){.hero::before,.stage{animation:none}}
</style>
</head>
<body>
<div class="hero" id="hero" title="クリックでリプレイ">
  <div class="stage">
    <video id="logo" src="../motion/grand_mark_big.webm" autoplay muted playsinline preload="auto"></video>
  </div>
  <svg class="grain" xmlns="http://www.w3.org/2000/svg"><filter id="gr"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#gr)"/></svg>
</div>
<script>
  var v=document.getElementById('logo'), hero=document.getElementById('hero');
  v.addEventListener('ended', function(){ try{v.pause();}catch(e){} });
  hero.addEventListener('click', function(){ try{v.currentTime=0; v.play();}catch(e){} });
</script>
</body>
</html>
